<!DOCTYPE html>
<!-- MyLifeOS v5 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Life OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f0;--surface:#ffffff;--surface2:#f0efe9;--border:#e0ddd6;--accent:#b8892a;--accent2:#4a9e8e;--accent3:#b85a5a;--text:#1a1814;--text2:#5a5448;--text3:#9a9488;--success:#3a8a6e;--danger:#b85a5a;--warning:#b8892a;--past-tint:#ecdfc4;--past-tint-border:#d8c294;--r:12px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.logo h1{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);letter-spacing:.02em}
.logo p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13.5px;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(201,169,110,.06);font-weight:500}
.nav-icon{font-size:17px;width:20px;text-align:center}
.main{flex:1;padding:32px 36px;max-width:900px}
.page{display:none}
.page.active{display:block}
.page-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--text);margin-bottom:6px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
input[type=text],input[type=date],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--surface);color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s}
.btn-primary{background:var(--accent);color:#1a1208;border-color:var(--accent)}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text3);background:var(--surface2)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:rgba(201,126,126,.1)}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;letter-spacing:.04em}
.badge-done{background:rgba(126,184,164,.15);color:var(--success)}
.badge-pending{background:rgba(201,169,110,.15);color:var(--warning)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.label{font-size:12px;color:var(--text3);margin-bottom:5px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;text-align:center}
.stat-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--accent)}
.stat-label{font-size:12px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.07em}
.progress-wrap{background:var(--surface2);border-radius:6px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .4s}
.progress-fill.green{background:var(--success)}
.item-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-body{flex:1}
.item-title{font-size:14px;color:var(--text);font-weight:500}
.item-meta{font-size:12px;color:var(--text3);margin-top:3px}
.check{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--success);font-size:13px;flex-shrink:0;margin-top:1px;transition:all .15s;user-select:none}
.check.checked{border-color:var(--success);background:rgba(126,184,164,.15)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
#save-status{font-size:11px;color:var(--text3);padding:2px 0;transition:color .3s}
#save-status.saved{color:var(--success)}
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:5px;margin-bottom:16px}
.day-dot{width:100%;aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:400;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:var(--surface2);transition:border-color .12s,color .12s,background .12s;position:relative;gap:1px}
.day-dot:hover{border-color:var(--accent);color:var(--text2)}
.day-dot .dd-num{line-height:1;font-size:11px}
.day-dot .dd-mark{line-height:1;font-size:9px;opacity:0}
.day-dot.done{background:var(--success);border-color:var(--success)}
.day-dot.done .dd-num{color:#fff;font-weight:600}
.day-dot.done .dd-mark{opacity:1;color:#fff}
.day-dot.missed{background:var(--danger);border-color:var(--danger)}
.day-dot.missed .dd-num{color:#fff;font-weight:600}
.day-dot.missed .dd-mark{opacity:1;color:#fff}
.day-dot.past-empty{}
.day-dot.today{background:var(--accent);border-color:var(--accent);font-weight:600}
.day-dot.today .dd-num{color:#fff}
.day-dot.today .dd-mark{opacity:1;color:#fff}
.day-dot.done.today,.day-dot.missed.today{border:2px solid var(--text)}
.day-dot.done.today .dd-num,.day-dot.missed.today .dd-num{color:#fff}
.time-table{width:100%;border-collapse:collapse;font-size:13px}
.time-table th{background:var(--surface2);color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.07em;padding:8px 10px;border:1px solid var(--border);text-align:left}
.time-table td{padding:7px 10px;border:1px solid var(--border);vertical-align:top}
.time-table td:first-child{color:var(--text3);font-size:12px;white-space:nowrap;width:80px}
.time-table td input{background:transparent;border:none;padding:0;font-size:13px;color:var(--text);width:100%}
.time-table td input:focus{outline:none}
.time-table td textarea.task-input{background:transparent;border:none;padding:0;font-size:13px;color:var(--text);width:100%;resize:none;overflow:hidden;min-height:20px;height:auto;line-height:1.5;font-family:'DM Sans',sans-serif;display:block;box-sizing:border-box;white-space:pre-wrap;word-wrap:break-word;}
.time-table td textarea.task-input:focus{outline:none;}
.time-table tr{vertical-align:top;}
.time-table td.task-cell{min-width:180px;}
.time-table td select{background:transparent;border:none;padding:0;font-size:12px;color:var(--accent);width:auto}
.time-table tr.uu td{background:rgba(184,90,90,0.07)}
.time-table tr.un td{background:rgba(184,137,42,0.07)}
.time-table tr.nu td{background:rgba(58,138,110,0.07)}
.time-table tr.nn td{background:var(--surface2)}
/* ── TASK COMPLETION CHECKBOX ── */
.task-check{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s;user-select:none;background:var(--surface);margin-top:2px;}
.check-cell-row{display:flex;align-items:center;justify-content:center;gap:6px;}
.excl-toggle{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s;user-select:none;background:var(--surface);opacity:.45;filter:grayscale(1);}
.excl-toggle:hover{opacity:.8;}
.excl-toggle.active{border-color:var(--text2);opacity:1;filter:none;background:rgba(90,84,72,0.14);}
.time-table tr.excl-row td{background:rgba(90,84,72,0.06)!important;}
.time-table td.task-over-limit{border-color:var(--danger)!important;}
.task-check.done{border-color:var(--success);background:rgba(58,138,110,0.15);color:var(--success);}
.task-check-cell{width:56px;text-align:center;}
/* ── STATS SUMMARY GRID ── */
.sched-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.sched-stat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--surface2);border-radius:var(--rs);border:1px solid var(--border);font-size:13px;}
.sched-stat-row.divider{border-top:2px solid var(--border);margin-top:4px;}
.sched-stat-label{color:var(--text2);}
.sched-stat-val{font-weight:600;font-family:'DM Serif Display',serif;font-size:15px;}
.sched-stat-val.danger{color:var(--danger);}
.sched-stat-val.warning{color:var(--warning);}
.sched-stat-val.success{color:var(--success);}
.sched-stat-val.accent{color:var(--accent);}
.sched-stat-val.muted{color:var(--text3);}
.completion-bar-wrap{margin-top:10px;background:var(--surface2);border-radius:6px;height:10px;overflow:hidden;border:1px solid var(--border);}
.completion-bar-fill{height:100%;border-radius:6px;background:var(--success);transition:width .4s;}
@media(max-width:700px){.sched-stats-grid{grid-template-columns:1fr;}}
.chart-box{background:var(--surface2);border-radius:var(--rs);padding:16px;margin-top:12px;height:200px;position:relative}
.habit-week{display:flex;gap:5px;margin-top:6px}
.habit-day{width:32px;height:32px;border-radius:5px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);cursor:pointer;user-select:none;transition:all .12s}
.habit-day.done{background:rgba(126,184,164,.2);border-color:var(--success);color:var(--success);font-weight:700}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:20px;color:var(--accent)}
.modal-footer{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
@media(max-width:700px){
  .app{flex-direction:row;align-items:flex-start;}
  .sidebar{display:flex !important;width:200px;min-width:160px;max-width:200px;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .main{padding:14px 12px;min-width:0;flex:1;overflow-x:hidden;}
  .grid2,.grid3{grid-template-columns:1fr;}
  .logo h1{font-size:15px;}
  .logo p{display:none;}
  .nav-item{padding:9px 12px;font-size:12px;}
  .nav-icon{font-size:15px;}
  .export-bar{padding:10px 12px;}
  .mobile-nav{display:none !important;}
}
.mobile-nav{display:none}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;color:var(--text3);font-size:10px}
.mobile-nav-item.active{color:var(--accent)}
.mobile-nav-item .ico{font-size:20px}
.export-bar{padding:12px 20px;border-top:1px solid var(--border)}
.g1-sub{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:10px;overflow:hidden}
.g1-sub-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);cursor:pointer;user-select:none;transition:background .15s}
.g1-sub-header:hover{background:#e8e6df}
.g1-sub-title-input{font-size:14px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;flex:1;font-family:'DM Sans',sans-serif;cursor:text}
.g1-sub-toggle{font-size:13px;color:var(--text3);flex-shrink:0;transition:transform .2s;display:inline-block}
.g1-sub-toggle.open{transform:rotate(90deg)}
.g1-sub-body{display:none;padding:0}
.g1-sub-body.open{display:block}
.rich-toolbar{display:flex;gap:4px;flex-wrap:wrap;padding:8px 12px;border-bottom:1px solid var(--border);background:#faf9f7;align-items:center}
.rich-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid transparent;cursor:pointer;font-size:13px;color:var(--text2);background:transparent;transition:all .12s;font-family:'DM Sans',sans-serif;font-weight:500}
.rich-btn:hover{background:var(--surface2);border-color:var(--border);color:var(--text)}
.rich-btn.active{background:rgba(184,137,42,.15);border-color:var(--accent);color:var(--accent)}
.rich-sep{width:1px;height:20px;background:var(--border);margin:0 3px}
.draw-toolbar{display:flex;gap:6px;padding:8px 12px;background:#faf9f7;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.draw-canvas{display:block;width:100%;cursor:crosshair;background:#fff;touch-action:none}
.color-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s;flex-shrink:0}
.color-dot.sel{border-color:var(--text)}
.rich-editor{min-height:120px;padding:12px 14px;outline:none;font-size:14px;line-height:1.7;color:var(--text);font-family:'DM Sans',sans-serif}
.rich-editor:empty::before{content:attr(data-ph);color:var(--text3);pointer-events:none}
.rich-editor ul,.rich-editor ol{padding-left:20px}
.hide-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(184,137,42,.12);color:var(--warning);border:1px solid rgba(184,137,42,.25);flex-shrink:0}
.show-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(58,138,110,.1);color:var(--success);border:1px solid rgba(58,138,110,.25);flex-shrink:0}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:18px;}
.tab-btn{padding:9px 20px;font-size:13.5px;font-weight:500;color:var(--text3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:'DM Sans',sans-serif;transition:all .15s;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
/* ── RICH EDITOR ── */
.re-wrap{border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;background:#fff;}
.re-tools-toggle{display:flex;align-items:center;gap:6px;padding:7px 12px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;user-select:none;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid transparent;transition:all .15s;}
.re-tools-toggle:hover{color:var(--text2);}
.re-tools-toggle .arr{font-size:10px;transition:transform .2s;display:inline-block;}
.re-tools-toggle .arr.open{transform:rotate(90deg);}
.re-toolbar{display:none;flex-wrap:wrap;gap:3px;padding:7px 10px;border-bottom:1px solid var(--border);background:#faf9f7;align-items:center;}
.re-toolbar.open{display:flex;}
.re-btn{min-width:28px;height:26px;padding:0 6px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid transparent;cursor:pointer;font-size:13px;color:var(--text2);background:transparent;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s;}
.re-btn:hover{background:var(--surface2);border-color:var(--border);color:var(--text);}
.re-btn.on{background:rgba(184,137,42,.15);border-color:var(--accent);color:var(--accent);}
.re-sep{width:1px;height:18px;background:var(--border);margin:0 2px;}
.re-editor{min-height:110px;padding:12px 14px;outline:none;font-size:14px;line-height:1.75;color:var(--text);font-family:'DM Sans',sans-serif;}
.re-editor:empty::before{content:attr(data-ph);color:var(--text3);pointer-events:none;}
.re-editor ul,.re-editor ol{padding-left:22px;}
/* draw panel inside rich editor */
.re-draw{display:none;border-top:1px solid var(--border);}
.re-draw.open{display:block;}
.re-draw-bar{display:flex;gap:6px;padding:7px 10px;background:#faf9f7;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
.re-canvas{display:block;width:100%;cursor:crosshair;background:#fff;touch-action:none;}
.cdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.cdot.sel{border-color:#333;}
.re-color-bar{display:none;flex-wrap:wrap;gap:7px;padding:8px 10px;border-bottom:1px solid var(--border);background:#fff;align-items:center;}
.re-color-bar.open{display:flex;}
.re-color-bar .cdot{position:relative;}
.re-color-bar input[type=color]{width:24px;height:24px;border:1px solid var(--border);border-radius:50%;padding:0;cursor:pointer;background:none;-webkit-appearance:none;}
.re-color-bar input[type=color]::-webkit-color-swatch-wrapper{padding:0;border-radius:50%;}
.re-color-bar input[type=color]::-webkit-color-swatch{border:none;border-radius:50%;}
/* ── GOAL 1 DETAIL SUBS (keep existing) ── */
.g1-sub{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:10px;overflow:hidden;}
.g1-sub-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);cursor:pointer;user-select:none;transition:background .15s;}
.g1-sub-header:hover{background:#e8e6df;}
.g1-sub-title-input{font-size:14px;font-weight:500;color:var(--text);background:transparent;border:none;outline:none;flex:1;font-family:'DM Sans',sans-serif;cursor:text;}
.g1-sub-toggle{font-size:12px;color:var(--text3);flex-shrink:0;transition:transform .2s;display:inline-block;}
.g1-sub-toggle.open{transform:rotate(90deg);}
.g1-sub-body{display:none;}
.g1-sub-body.open{display:block;}
.hide-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(184,137,42,.12);color:var(--warning);border:1px solid rgba(184,137,42,.25);flex-shrink:0;cursor:pointer;}
.show-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(58,138,110,.1);color:var(--success);border:1px solid rgba(58,138,110,.25);flex-shrink:0;cursor:pointer;}
/* ── CLOUD STATUS ── */
#save-status.syncing{color:var(--warning);}
#save-status.synced{color:var(--success);}
#save-status.offline{color:var(--text3);}

/* ── YN INPUT (Urgent/Important keyboard shortcut) ── */
.yn-input{width:38px;text-align:center;font-size:13px;font-weight:600;padding:5px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);cursor:pointer;caret-color:transparent;outline:none;user-select:none;}
.yn-input::placeholder{color:var(--text3);opacity:1;font-weight:400;}
.yn-input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 22%,transparent);}
.yn-input:focus::placeholder{color:var(--accent);opacity:0.75;}

/* ── SPIRITUAL GOALS ── */
.sp-goal-block{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:12px;overflow:hidden;}
.sp-goal-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface2);cursor:pointer;user-select:none;transition:background .15s;}
.sp-goal-header:hover{background:#e8e6df;}
.sp-goal-toggle{font-size:12px;color:var(--text3);flex-shrink:0;transition:transform .2s;display:inline-block;}
.sp-goal-toggle.open{transform:rotate(90deg);}
.sp-goal-body{display:none;padding:16px;}
.sp-goal-body.open{display:block;}
/*
